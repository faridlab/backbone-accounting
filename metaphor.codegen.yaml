# Codegen policy for backbone-accounting.
#
# `user_owned` globs are hand-written files that live inside generator-owned trees but are
# NOT schema-derived. `metaphor schema generate [--force]` skips them wholesale (never reads,
# merges, or deletes them). Everything else in src/ is regenerated from schema/models.
#
# Re-exports/declarations that must sit alongside generated code live inside
# `// <<< CUSTOM ... // END CUSTOM` markers (service/mod.rs, presentation/http/mod.rs,
# exports/events.rs, lib.rs) and are preserved by the marker mechanism, not listed here.

user_owned:
  # GL-posting contract — hand-authored double-entry behavior + its HTTP surface.
  - "src/application/service/posting_service.rs"
  - "src/presentation/http/posting_handler.rs"

  # Manual-journal approval workflow (draft → submit → approve → post → void).
  - "src/application/service/journal_workflow_service.rs"
  - "src/presentation/http/journal_workflow_handler.rs"

  # GL-posting domain contract types (shared by ports, rules, and the service).
  - "src/domain/gl_posting.rs"
  # Pure posting-validation rules (no I/O).
  - "src/domain/services/posting_rules.rs"

  # Hand-authored repository ports (domain layer).
  - "src/domain/repositories/posting_repository.rs"
  - "src/domain/repositories/journal_workflow_repository.rs"
  - "src/domain/repositories/period_close_repository.rs"
  - "src/domain/repositories/bank_reconciliation_repository.rs"
  - "src/domain/repositories/reporting_repository.rs"

  # SQLx adapters for those ports (infrastructure layer) — all persistence lives here.
  - "src/infrastructure/persistence/posting_repository.rs"
  - "src/infrastructure/persistence/journal_workflow_repository.rs"
  - "src/infrastructure/persistence/period_close_repository.rs"
  - "src/infrastructure/persistence/bank_reconciliation_repository.rs"
  - "src/infrastructure/persistence/reporting_repository.rs"

  # Entity hierarchy read (ancestors root → self) for account / cost_center / fiscal_period.
  - "src/domain/repositories/hierarchy_repository.rs"
  - "src/infrastructure/persistence/hierarchy_repository.rs"
  - "src/application/service/hierarchy_service.rs"
  - "src/presentation/http/hierarchy_handler.rs"

  # Financial-statement generation (Trial Balance / Balance Sheet / Income Statement).
  - "src/application/service/reporting_service.rs"
  - "src/presentation/http/reporting_handler.rs"

  # Bank reconciliation matching + fiscal-period close.
  - "src/application/service/bank_reconciliation_service.rs"
  - "src/application/service/period_close_service.rs"
  - "src/presentation/http/accounting_ops_handler.rs"
  - "src/presentation/http/guarded_routes.rs"

  # Message-bus adapter (publishes posting events to backbone-messaging).
  - "src/infrastructure/messaging/**"

  # Behavior tests + BDD oracle (the golden cases).
  - "tests/posting_golden_cases.rs"
  - "tests/reporting_golden_cases.rs"
  - "tests/reconciliation_golden_cases.rs"
  - "tests/period_close_golden_cases.rs"
  - "tests/messaging_bus.rs"
  - "tests/integrity_probes.rs"
  - "tests/journal_workflow_golden_cases.rs"
  - "tests/features/**"

  # Hand-authored module documentation (PRD/BRD/FSD, business flows, ADRs).
  - "docs/prd.md"
  - "docs/brd.md"
  - "docs/fsd.md"
  - "docs/extension-guide.md"
  - "docs/business-flows/**"
  - "docs/adr/**"
